# render.yaml - Blueprint para deploy automático no Render.com
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: finsystem-db
    plan: free
    databaseName: finsystem_db
    user: finsystem_user
    region: oregon

services:
  - type: web
    name: finsystem
    runtime: ruby
    plan: free
    region: oregon
    buildCommand: bundle install
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RACK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: finsystem-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: FINSYSTEM_API_KEY
        value: finsystem_prod_api_key_2026_instasolutions
      - key: RAILS_MAX_THREADS
        value: 5
    autoDeploy: true  # Deploy automático ao push no GitHub
